<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>我們組的 Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <!-- 組長任務：把這裡改成你們組的名稱 -->
      <h1>🤖 第 X 組的 Chatbot</h1>
      <p class="subtitle">W4 多人協作練習</p>
    </header>

    <!-- 組員 A 任務：在這裡加上訊息計數顯示 -->
    <!-- <p id="counter">訊息數：0</p> -->

    <div id="chat-box">
      <div class="message bot">
        大膽刁民 報上名來 朕今日正好有空聽你碎嘴
      </div>
    </div>

    <div class="input-area">
      <input id="user-input" type="text" placeholder="輸入訊息...">
      <button onclick="sendMessage()">送出</button>
    </div>

    <!-- 組員 B 任務：在這裡加上組員名單 -->
    <footer>
      <!-- 範例：<p>組員：王小明、李小花、陳大志</p> -->
    </footer>
  </div>

  <script>
    let messageCount = 0;
    const emperorResponses = [
      "准奏",
      "退下吧 朕乏了",
      "朕知道了 愛卿所言甚是",
      "此等小事 何須煩擾朕",
      "大膽 竟敢對朕如此無禮",
      "賞",
      "拉出去斬了"
    ];

    function sendMessage() {
      const input = document.getElementById('user-input');
      const chatBox = document.getElementById('chat-box');
      const text = input.value.trim();

      if (!text) return;

      const userDiv = document.createElement('div');
      userDiv.className = 'message user';
      userDiv.textContent = text;
      chatBox.appendChild(userDiv);

      const botDiv = document.createElement('div');
      botDiv.className = 'message bot';
      
      let reply = "";
      if (messageCount === 0) {
        reply = "住口";
      } else {
        // 簡單的關鍵字邏輯
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const date = now.getDate();

        if (text.includes("日期") || text.includes("今天") || text.includes("幾號")) {
          reply = `今日乃西元${year}年${month}月${date}日 爾等刁民連日子都記不得嗎`;
        } else if (text.includes("天氣")) {
          reply = "朕觀今日晴空萬里 乃祥瑞之兆 預示朕的大好江山萬年長青";
        } else if (text.includes("錢") || text.includes("稅") || text.includes("窮")) {
          reply = "國庫空虛 爾等竟還敢提錢 拖出去重打三十大板";
        } else if (text.includes("打仗") || text.includes("兵") || text.includes("敵")) {
          reply = "朕的精銳之師早已整裝待發 區區小賊 何足掛齒";
        } else if (text.includes("名") || text.includes("是誰")) {
          reply = "憑你也配問朕的名諱 跪下";
        } else if (text.includes("吃") || text.includes("飯") || text.includes("餓")) {
          reply = "御膳房今日做了八寶鴨 朕賞你個鴨屁股吧";
        } else {
          const randomIndex = Math.floor(Math.random() * emperorResponses.length);
          reply = emperorResponses[randomIndex];
        }
      }
      
      botDiv.textContent = reply;
      chatBox.appendChild(botDiv);

      messageCount++;
      input.value = '';
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById('user-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>

</body>
</html>
